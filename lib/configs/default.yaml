page:
  size: A4
  orientation: portrait
  margin_top: 2.54cm
  margin_bottom: 2.54cm
  margin_left: 2.54cm
  margin_right: 2.54cm
  header_distance: 1.25cm
  footer_distance: 1.25cm
header:
  left:
  - '{title}'
  - '{author}'
  center: ''
  right: '{date}'
  image: images/icon.png
  image_height_cm: 1.0
footer:
  left: ''
  center: Page {page} of {total}
  right: '{author}'
  page_total: content
header_line:
  show: true
  color: AAAAAA
  width: 6
footer_line:
  show: true
  color: AAAAAA
  width: 6
frontpage:
  cover_start_page: 1
  toc_start_page: 2
  content_start_page: 1
numbered_headings: true
styles:
  heading_1:
    font_name: Calibri
    font_size_pt: 22
    bold: true
    color: 1F3864
    space_before_pt: 12
    space_after_pt: 6
  heading_2:
    font_name: Calibri
    font_size_pt: 16
    bold: true
    color: 2E75B6
    space_before_pt: 10
    space_after_pt: 4
  heading_3:
    font_name: Calibri
    font_size_pt: 13
    bold: true
    color: 1F3864
    space_before_pt: 8
    space_after_pt: 2
  heading_4:
    font_name: Calibri
    font_size_pt: 12
    bold: true
    color: 2E75B6
    space_before_pt: 6
    space_after_pt: 2
  heading_5:
    font_name: Calibri
    font_size_pt: 11
    bold: true
    color: 1F3864
    space_before_pt: 4
    space_after_pt: 2
  heading_6:
    font_name: Calibri
    font_size_pt: 11
    bold: false
    color: 2E75B6
    space_before_pt: 4
    space_after_pt: 2
  normal:
    font_name: Calibri
    font_size_pt: 11
    space_after_pt: 6
  code:
    font_name: Courier New
    font_size_pt: 9
    background: F0F0F0
    border_color: AAAAAA
    space_before_pt: 2
    space_after_pt: 2
  block_quote:
    font_italic: true
    color: '444444'
    bar_color: 2E75B6
    left_indent_in: 0.15
    right_indent_in: 0.15
    space_before_pt: 4
    space_after_pt: 4
  caption:
    font_size_pt: 9
    color: '555555'
    italic: true
    space_before_pt: 2
    space_after_pt: 8
  table_header:
    background: 1F3864
    font_color: FFFFFF
    bold: true
  table_rows:
    odd_background: F7F7F7
    even_background: FFFFFF
  alerts:
    note_color: 2E75B6
    tip_color: 28A745
    warning_color: FFA500
    caution_color: DC3545
    background: F5F5F5
  cover_title:
    font_name: Calibri
    font_size_pt: 22
    color: 1F3864
    bold: true
    space_before_pt: 24
    space_after_pt: 8
  cover_subtitle:
    font_name: Calibri
    font_size_pt: 14
    color: 2E75B6
    bold: false
    space_before_pt: 10
    space_after_pt: 6
  cover_body:
    font_name: Calibri
    font_size_pt: 11
    color: '000000'
    bold: false
    space_before_pt: 6
    space_after_pt: 4
image_sizes:
  xs:
    max_pct: 20
  small:
    max_pct: 30
  medium:
    max_pct: 50
  large:
    max_pct: 75
  xl:
    max_pct: 100
