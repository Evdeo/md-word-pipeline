# Document Properties
# These values can be referenced in markdown using {{property.subproperty}} syntax

project:
  name: "md_to_docx"
  version: "2.0"
  repository: "https://github.com/example/md_to_docx"
  license: "MIT"

capabilities:
  supported_formats: "Markdown to Word (.docx)"
  max_heading_levels: "6"
  supported_languages: "Python, JavaScript, and any code"
  parser: "Marko with GFM extensions"

converter:
  output_format: "Microsoft Word (.docx)"
  template_support: "Yes"
  page_numbering: "Automatic"
  toc_generation: "Yes"
  cross_references: "Yes"
  image_processing: "Built-in"

features:
  heading_count: "6 levels"
  table_types: "3 styles"
  image_sizes: "5 classes (xs, small, medium, large, xl)"
  alert_types: "4 types (note, tip, warning, caution)"
  code_languages: "Any"

statistics:
  files_processed: "1,250+"
  lines_of_code: "15,000+"
  test_coverage: "85%"
  last_update: "March 2026"
